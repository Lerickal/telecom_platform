{% extends "base.html" %}

{% block content %}
<div id="app">
    <h2>Plans</h2>

    <p v-if="loading">Loading plans...</p>
    <p v-if="error" style="color:red;">[[ error ]]</p>

    <!-- Add Plan Form -->
    <div style="background:white; padding:1rem; margin-bottom:1rem;">
        <h3>Add New Plan</h3>
        <div style="display:flex; gap:1rem; align-items:center;">
            <div>
                <label>Plan Name</label><br>
                <input v-model="newPlan.name" type="text" placeholder="e.g. Basic"
                       style="padding:5px; width:200px;"/>
            </div>
            <div>
                <label>Monthly Fee (R)</label><br>
                <input v-model="newPlan.monthly_fee" type="number" placeholder="e.g. 199"
                       style="padding:5px; width:150px;"/>
            </div>
            <div style="align-self:flex-end;">
                <button @click="addPlan"
                        style="background:#003366; color:white; border:none; padding:7px 15px; cursor:pointer;">
                    Add Plan
                </button>
            </div>
        </div>
        <p v-if="formError" style="color:red; margin-top:0.5rem;">[[ formError ]]</p>
        <p v-if="formSuccess" style="color:green; margin-top:0.5rem;">[[ formSuccess ]]</p>
    </div>

    <!-- Plans Table -->
    <table border="1" cellpadding="10" cellspacing="0"
           style="width:100%; background:white; border-collapse:collapse;">
        <thead style="background-color:#003366; color:white;">
            <tr>
                <th>ID</th>
                <th>Plan Name</th>
                <th>Monthly Fee</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr v-for="plan in plans" :key="plan.id">
                <td>[[ plan.id ]]</td>
                <td>[[ plan.name ]]</td>
                <td>R[[ plan.monthly_fee ]]</td>
                <td>
                    <button @click="deletePlan(plan.id)"
                            style="background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">
                        Delete
                    </button>
                </td>
            </tr>
            <tr v-if="plans.length === 0">
                <td colspan="4" style="text-align:center;">No plans found.</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script>
    const { createApp } = Vue

    createApp({
        delimiters: ['[[', ']]'],
        data() {
            return {
                plans: [],
                loading: true,
                error: null,
                formError: null,
                formSuccess: null,
                newPlan: {
                    name: '',
                    monthly_fee: ''
                }
            }
        },
        methods: {
            async fetchPlans() {
                try {
                    const response = await fetch('/api/plans/')
                    this.plans = await response.json()
                } catch (err) {
                    this.error = 'Failed to load plans.'
                } finally {
                    this.loading = false
                }
            },
            async addPlan() {
                this.formError = null
                this.formSuccess = null

                if (!this.newPlan.name || !this.newPlan.monthly_fee) {
                    this.formError = 'Both fields are required.'
                    return
                }

                try {
                    const response = await fetch('/api/plans/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.newPlan)
                    })

                    if (!response.ok) {
                        this.formError = 'Failed to add plan.'
                        return
                    }

                    this.formSuccess = `Plan "${this.newPlan.name}" added successfully.`
                    this.newPlan = { name: '', monthly_fee: '' }
                    await this.fetchPlans()
                } catch (err) {
                    this.formError = 'An error occurred.'
                }
            },
            async deletePlan(id) {
                if (!confirm('Are you sure you want to delete this plan?')) return

                try {
                    await fetch(`/api/plans/${id}/`, { method: 'DELETE' })
                    await this.fetchPlans()
                } catch (err) {
                    this.error = 'Failed to delete plan.'
                }
            }
        },
        mounted() {
            this.fetchPlans()
        }
    }).mount('#app')
</script>
{% endblock %}
